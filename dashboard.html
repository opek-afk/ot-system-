<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - ระบบคำนวณ OT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --navy: #1e3a5f;
    --navy-dark: #15293f;
    --teal: #2a9d8f;
    --teal-dark: #21807a;
    --bg: #f4f7f9;
    --card: #ffffff;
    --text: #1f2937;
    --text-soft: #6b7280;
    --border: #e2e8f0;
    --radius: 12px;
  }

  .export-bar {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .export-bar .label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-right: 4px;
  }

  .export-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.85; }
  .export-btn.pdf { background: #e74c3c; color: #fff; }
  .export-btn.excel { background: #1d6f42; color: #fff; }

  @media print {
    header, .filter-bar, .export-bar, .hero-row, .nav-btn { display: none !important; }
    body { background: #fff; }
    .card { box-shadow: none; border: 1px solid #ddd; }
    main { max-width: 100%; padding: 0; margin: 0; }
    table { font-size: 11pt; }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Noto Sans Thai', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  header {
    background: linear-gradient(120deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: #fff;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  header .title { display: flex; align-items: center; gap: 10px; }
  header .icon { font-size: 22px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header .sub { font-size: 12px; color: #b9c6d6; margin-top: 2px; }

  .nav-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.22); }

  main {
    max-width: 900px;
    margin: 26px auto;
    padding: 0 18px 60px;
  }

  .filter-bar {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-bar label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .filter-bar select {
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
  }

  .filter-bar select:focus {
    outline: none;
    border-color: var(--teal);
  }

  /* Hero cards ด้านบน */
  .hero-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }

  .hero-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  }

  .hero-card.accent {
    background: linear-gradient(120deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: #fff;
  }

  .hero-card .h-label {
    font-size: 12.5px;
    color: var(--text-soft);
    margin-bottom: 6px;
  }

  .hero-card.accent .h-label { color: #b9c6d6; }

  .hero-card .h-value {
    font-size: 26px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.1;
  }

  .hero-card.accent .h-value { color: #fff; }

  .hero-card .h-unit {
    font-size: 13px;
    font-weight: 500;
    margin-left: 3px;
    color: var(--text-soft);
  }

  .hero-card.accent .h-unit { color: #8fb3d4; }

  /* ตารางหลัก */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 20px 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    overflow-x: auto;
  }

  .card h2 {
    font-size: 14.5px;
    color: var(--navy);
    margin: 0 0 14px;
    font-weight: 700;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    min-width: 500px;
  }

  thead tr {
    background: var(--navy);
    color: #fff;
  }

  thead th {
    padding: 11px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
  }

  thead th:not(:first-child) { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }

  td {
    padding: 12px 14px;
    vertical-align: middle;
  }

  td:not(:first-child) { text-align: right; }

  .td-name { font-weight: 600; }
  .td-role {
    font-size: 11.5px;
    color: var(--text-soft);
    margin-top: 2px;
  }

  .td-type { color: var(--text-soft); }
  .td-total {
    font-weight: 700;
    color: var(--teal-dark);
  }

  tfoot tr {
    background: #eef6f5;
    border-top: 2px solid var(--teal);
  }

  tfoot td {
    font-weight: 700;
    color: var(--navy);
    padding: 12px 14px;
  }

  tfoot td:not(:first-child) { text-align: right; }

  .empty-box {
    text-align: center;
    padding: 30px 0;
    color: var(--text-soft);
    font-size: 13.5px;
  }

  .guard-box {
    max-width: 420px;
    margin: 80px auto;
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 26px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .guard-box h2 { color: var(--navy); margin-top: 0; }
  .guard-box a {
    display: inline-block;
    margin-top: 14px;
    background: var(--teal);
    color: #fff;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 7px;
    font-weight: 700;
    font-size: 14px;
  }

  @media (max-width: 600px) {
    .hero-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="guard-box" id="guardBox" style="display:none;">
  <h2>ไม่มีสิทธิ์เข้าถึงหน้านี้</h2>
  <p style="color:var(--text-soft);font-size:14px;">หน้านี้สำหรับ CM เท่านั้น</p>
  <a href="index.html">ไปหน้าเข้าสู่ระบบ</a>
</div>

<div id="appContent" style="display:none;">
  <header>
    <div class="title">
      <span class="icon">📈</span>
      <div>
        <h1>Dashboard OT ทีม</h1>
        <div class="sub" id="greetingSub"></div>
      </div>
    </div>
    <a href="home.html" class="nav-btn">← หน้าหลัก</a>
  </header>

  <main>
    <!-- ตัวกรอง -->
    <div class="filter-bar">
      <label>ดูข้อมูลเดือน:</label>
      <select id="filterMonth"></select>
      <select id="filterYear"></select>
    </div>

    <!-- Hero stats -->
    <div class="hero-row">
      <div class="hero-card accent">
        <div class="h-label">ยอดรวม OT ทั้งทีม</div>
        <div class="h-value"><span id="heroTotal">0</span><span class="h-unit">บาท</span></div>
      </div>
      <div class="hero-card">
        <div class="h-label">จำนวนพนักงานที่ทำ OT</div>
        <div class="h-value"><span id="heroCount">0</span><span class="h-unit">คน</span></div>
      </div>
    </div>

    <!-- ปุ่ม Export -->
    <div class="export-bar">
      <span class="label">💾 Export:</span>
      <button class="export-btn pdf" onclick="exportPDF()">📄 PDF</button>
      <button class="export-btn excel" onclick="exportExcel()">📊 Excel (.xlsx)</button>
    </div>

    <!-- ตารางยอด OT รายคน -->
    <div class="card">
      <h2>ยอด OT แยกรายคน</h2>
      <div id="tableWrap"><div class="empty-box">กำลังโหลด...</div></div>
    </div>
  </main>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwxUP6JF7JbJbIzAFPTnIt9LeWBfMe-qzwhn9j_7eEMHjJvlk0FKnh8wetF66Je7qJXaw/exec';

  const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

  // ===== ตรวจสอบสิทธิ์ — เฉพาะ CM เท่านั้น =====
  let currentUser = null;
  try {
    const stored = sessionStorage.getItem('otSystemUser');
    currentUser = stored ? JSON.parse(stored) : null;
  } catch(e) { currentUser = null; }

  if (!currentUser || currentUser.role !== 'CM') {
    document.getElementById('guardBox').style.display = 'block';
  } else {
    document.getElementById('appContent').style.display = 'block';
    document.getElementById('greetingSub').textContent = currentUser.name + ' | CM';
    initPage();
  }

  function initPage() {
    setupFilters();
    loadData();
  }

  function setupFilters() {
    const now = new Date();
    const monthSel = document.getElementById('filterMonth');
    const yearSel = document.getElementById('filterYear');

    THAI_MONTHS.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i + 1;
      opt.textContent = m;
      if (i + 1 === now.getMonth() + 1) opt.selected = true;
      monthSel.appendChild(opt);
    });

    for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = (y + 543) + ' (พ.ศ.)';
      if (y === now.getFullYear()) opt.selected = true;
      yearSel.appendChild(opt);
    }

    monthSel.addEventListener('change', loadData);
    yearSel.addEventListener('change', loadData);
  }

  let lastResult = null; // เก็บข้อมูลล่าสุดไว้ใช้ตอน export

  async function loadData() {
    document.getElementById('heroTotal').textContent = '0';
    document.getElementById('heroCount').textContent = '0';
    document.getElementById('tableWrap').innerHTML = '<div class="empty-box">กำลังโหลด...</div>';

    const month = document.getElementById('filterMonth').value;
    const year = document.getElementById('filterYear').value;

    try {
      const result = await callApi({ action: 'getTeamOT', month, year });

      if (!result.success) {
        document.getElementById('tableWrap').innerHTML = '<div class="empty-box">โหลดข้อมูลไม่สำเร็จ</div>';
        return;
      }

      lastResult = result;
      renderDashboard(result);
    } catch(err) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty-box">เชื่อมต่อไม่ได้ (' + escHtml(err.message) + ')</div>';
    }
  }

  function renderDashboard(result) {
    const team = result.team || [];
    const allTypes = result.allTypes || [];

    document.getElementById('heroTotal').textContent = formatMoney(result.grandTotal || 0);
    document.getElementById('heroCount').textContent = team.length;

    if (team.length === 0) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty-box">ไม่มีข้อมูล OT ในเดือนนี้</div>';
      return;
    }

    // สร้างหัวตาราง
    const typeHeaders = allTypes.map(t => `<th>${escHtml(t)}</th>`).join('');
    const thead = `
      <thead>
        <tr>
          <th>พนักงาน</th>
          ${typeHeaders}
          <th>รวม (บาท)</th>
        </tr>
      </thead>
    `;

    // สร้างแถวข้อมูลแต่ละคน
    const rows = team.map(person => {
      const typeCells = allTypes.map(t => {
        const val = person.types[t] || 0;
        return `<td class="td-type">${val > 0 ? formatMoney(val) : '—'}</td>`;
      }).join('');

      return `
        <tr>
          <td>
            <div class="td-name">${escHtml(person.name)}</div>
            <div class="td-role">${escHtml(person.role)}</div>
          </td>
          ${typeCells}
          <td class="td-total">${formatMoney(person.grandTotal)}</td>
        </tr>
      `;
    }).join('');

    // แถวยอดรวม
    const typeTotals = allTypes.map(t => {
      const sum = team.reduce((s, p) => s + (p.types[t] || 0), 0);
      return `<td>${formatMoney(sum)}</td>`;
    }).join('');

    const tfoot = `
      <tfoot>
        <tr>
          <td>รวมทั้งหมด</td>
          ${typeTotals}
          <td>${formatMoney(result.grandTotal)}</td>
        </tr>
      </tfoot>
    `;

    document.getElementById('tableWrap').innerHTML = `
      <table>
        ${thead}
        <tbody>${rows}</tbody>
        ${tfoot}
      </table>
    `;
  }

  // ===== Export Functions =====

  function getPeriodLabel() {
    const month = document.getElementById('filterMonth').value;
    const year = document.getElementById('filterYear').value;
    const thaiYear = Number(year) + 543;
    const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    return `${THAI_MONTHS[Number(month) - 1]} พ.ศ. ${thaiYear}`;
  }

  function exportPDF() {
    if (!lastResult || !lastResult.team || lastResult.team.length === 0) {
      alert('ไม่มีข้อมูลสำหรับ export ในช่วงเวลานี้ครับ');
      return;
    }

    const periodLabel = getPeriodLabel();
    const team = lastResult.team;
    const allTypes = lastResult.allTypes || [];

    const typeHeaders = allTypes.map(t => `<th>${escHtml(t)}</th>`).join('');
    const rows = team.map((p, i) => {
      const typeCells = allTypes.map(t => {
        const val = p.types[t] || 0;
        return `<td style="text-align:right">${val > 0 ? formatMoney(val) : '—'}</td>`;
      }).join('');
      return `
        <tr style="${i % 2 === 1 ? 'background:#f4f9f8;' : ''}">
          <td>${escHtml(p.name)}</td>
          <td style="color:#555">${escHtml(p.role)}</td>
          ${typeCells}
          <td style="text-align:right;font-weight:700;">${formatMoney(p.grandTotal)}</td>
        </tr>`;
    }).join('');

    const typeTotals = allTypes.map(t => {
      const sum = team.reduce((s, p) => s + (p.types[t] || 0), 0);
      return `<td style="text-align:right">${formatMoney(sum)}</td>`;
    }).join('');

    const printContent = `<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard OT ทีม — ${periodLabel}</title>
<style>
  @page { size: A4 landscape; margin: 1.5cm 2cm; }
  body { font-family: 'TH Sarabun New','Sarabun','Noto Sans Thai',Arial,sans-serif; font-size: 13pt; color: #000; margin: 0; }
  .doc-header { text-align: center; margin-bottom: 16px; border-bottom: 2px solid #2a9d8f; padding-bottom: 10px; }
  .doc-header h1 { font-size: 17pt; font-weight: bold; margin: 0 0 4px; color: #1e3a5f; }
  .doc-header p { font-size: 12pt; margin: 2px 0; color: #444; }
  .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 11pt; color: #333; }
  table { width: 100%; border-collapse: collapse; font-size: 11pt; }
  thead tr { background-color: #1e3a5f; color: #fff; }
  thead th { padding: 8px 10px; text-align: left; font-weight: bold; }
  thead th:not(:first-child):not(:nth-child(2)) { text-align: right; }
  tbody td { padding: 7px 10px; border-bottom: 1px solid #ddd; }
  tfoot tr { background-color: #e8f5f3; font-weight: bold; border-top: 2px solid #2a9d8f; }
  tfoot td { padding: 8px 10px; }
  .grand-box { margin-top: 14px; padding: 12px 16px; background: #1e3a5f; color: #fff; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
  .grand-box .lbl { font-size: 12pt; }
  .grand-box .amt { font-size: 17pt; font-weight: bold; }
  .footer { margin-top: 20px; font-size: 10pt; color: #888; text-align: center; }
  .sign-area { margin-top: 36px; display: flex; justify-content: flex-end; }
  .sign-box { text-align: center; width: 200px; }
  .sign-box .line { border-top: 1px solid #000; margin-top: 46px; padding-top: 4px; font-size: 11pt; }
</style>
</head>
<body>
  <div class="doc-header">
    <h1>รายงานสรุปค่าตอบแทนการทำงานล่วงเวลา (OT) ทีม</h1>
    <p>Pimanjai Homecare &nbsp;|&nbsp; ช่วงเวลา: ${periodLabel}</p>
  </div>
  <div class="info-row">
    <span>ผู้ออกรายงาน: <strong>${escHtml(currentUser.name)}</strong> (CM)</span>
    <span>จำนวนพนักงาน: <strong>${team.length} คน</strong></span>
  </div>
  <table>
    <thead>
      <tr>
        <th>ชื่อ-นามสกุล</th>
        <th>ตำแหน่ง</th>
        ${typeHeaders}
        <th style="text-align:right">รวม (บาท)</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
    <tfoot>
      <tr>
        <td colspan="2">รวมทั้งหมด</td>
        ${typeTotals}
        <td style="text-align:right">${formatMoney(lastResult.grandTotal)}</td>
      </tr>
    </tfoot>
  </table>
  <div class="grand-box">
    <span class="lbl">ยอดรวม OT ทั้งทีม — ${periodLabel}</span>
    <span class="amt">${formatMoney(lastResult.grandTotal)} บาท</span>
  </div>
  <div class="sign-area">
    <div class="sign-box">
      <div class="line">ลายมือชื่อผู้อนุมัติ<br>(${escHtml(currentUser.name)})</div>
    </div>
  </div>
  <div class="footer">เอกสารนี้ออกโดยระบบคำนวณ OT Pimanjai Homecare — วันที่พิมพ์: ${new Date().toLocaleDateString('th-TH', {year:'numeric',month:'long',day:'numeric'})}</div>
  <script>window.onload = function(){ window.print(); }<\/script>
</body>
</html>`;

    const win = window.open('', '_blank');
    win.document.write(printContent);
    win.document.close();
  }

  function exportExcel() {
    if (!lastResult || !lastResult.team || lastResult.team.length === 0) {
      alert('ไม่มีข้อมูลสำหรับ export ในช่วงเวลานี้ครับ');
      return;
    }

    const periodLabel = getPeriodLabel();
    const month = document.getElementById('filterMonth').value;
    const year = document.getElementById('filterYear').value;
    const thaiYear = Number(year) + 543;
    const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    const fileName = `OT_ทีม_${THAI_MONTHS[Number(month)-1]}_${thaiYear}.xlsx`;

    const team = lastResult.team;
    const allTypes = lastResult.allTypes || [];

    // หัวเรื่อง
    const wsData = [
      ['รายงานสรุปค่าตอบแทนการทำงานล่วงเวลา (OT) ทีม'],
      [`Pimanjai Homecare  |  ช่วงเวลา: ${periodLabel}  |  ผู้ออกรายงาน: ${currentUser.name} (CM)`],
      [],
      // header ตาราง
      ['ชื่อ-นามสกุล', 'ตำแหน่ง', ...allTypes, 'รวม (บาท)']
    ];

    // แถวข้อมูลแต่ละคน
    team.forEach(p => {
      const typeCols = allTypes.map(t => p.types[t] || 0);
      wsData.push([p.name, p.role, ...typeCols, p.grandTotal]);
    });

    // แถวยอดรวม
    wsData.push([]);
    const typeTotals = allTypes.map(t => team.reduce((s, p) => s + (p.types[t] || 0), 0));
    wsData.push(['รวมทั้งหมด', '', ...typeTotals, lastResult.grandTotal]);

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // Merge หัวเรื่อง
    const totalCols = 2 + allTypes.length + 1;
    ws['!merges'] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: totalCols - 1 } },
      { s: { r: 1, c: 0 }, e: { r: 1, c: totalCols - 1 } },
    ];

    // ความกว้างคอลัมน์
    ws['!cols'] = [
      { wch: 22 }, // ชื่อ
      { wch: 14 }, // ตำแหน่ง
      ...allTypes.map(() => ({ wch: 14 })),
      { wch: 16 }, // รวม
    ];

    XLSX.utils.book_append_sheet(wb, ws, 'OT ทีม');
    XLSX.writeFile(wb, fileName);
  }

  // ===== Helpers =====
  async function callApi(payload) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function formatMoney(num) {
    return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
