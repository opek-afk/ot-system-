<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สรุป OT - ระบบคำนวณ OT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --navy: #1e3a5f;
    --navy-dark: #15293f;
    --teal: #2a9d8f;
    --teal-dark: #21807a;
    --bg: #f4f7f9;
    --card: #ffffff;
    --text: #1f2937;
    --text-soft: #6b7280;
    --border: #e2e8f0;
    --radius: 12px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Noto Sans Thai', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  header {
    background: linear-gradient(120deg, var(--navy) 0%, var(--navy-dark) 100%);
    color: #fff;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  header .title { display: flex; align-items: center; gap: 10px; }
  header .icon { font-size: 22px; }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header .sub { font-size: 12px; color: #b9c6d6; margin-top: 2px; }

  .nav-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.22); }

  .export-bar {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .export-bar .label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-right: 4px;
  }

  .export-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.85; }

  .export-btn.pdf { background: #e74c3c; color: #fff; }
  .export-btn.excel { background: #1d6f42; color: #fff; }

  /* CSS สำหรับตอนพิมพ์ PDF */
  @media print {
    header, .filter-bar, .export-bar, .nav-btn { display: none !important; }
    body { background: #fff; }
    .card { box-shadow: none; border: 1px solid #ddd; }
    .total-hero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    main { max-width: 100%; padding: 0; margin: 0; }
  }

  main {
    max-width: 560px;
    margin: 26px auto;
    padding: 0 18px 60px;
  }

  /* ตัวกรองเดือน/ปี */
  .filter-bar {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-bar .mode-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
  }

  .mode-btn {
    padding: 7px 16px;
    border: none;
    background: #fff;
    color: var(--text-soft);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active {
    background: var(--navy);
    color: #fff;
  }

  .filter-selects {
    display: flex;
    gap: 8px;
    flex: 1;
  }

  .filter-selects select {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
    min-width: 90px;
  }

  .filter-selects select:focus {
    outline: none;
    border-color: var(--teal);
  }

  /* การ์ดยอดรวมใหญ่ */
  .total-hero {
    background: linear-gradient(120deg, var(--navy) 0%, var(--navy-dark) 100%);
    border-radius: var(--radius);
    padding: 24px 22px;
    color: #fff;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(30,58,95,0.3);
  }

  .total-hero .period-label {
    font-size: 13px;
    color: #b9c6d6;
    margin-bottom: 6px;
  }

  .total-hero .grand {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }

  .total-hero .grand .unit {
    font-size: 18px;
    font-weight: 600;
    margin-left: 4px;
    color: #8fb3d4;
  }

  .total-hero .count-note {
    font-size: 12.5px;
    color: #8fb3d4;
    margin-top: 6px;
  }

  /* การ์ดแยกตามประเภท */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 20px 22px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    margin-bottom: 16px;
  }

  .card h2 {
    font-size: 14.5px;
    color: var(--navy);
    margin: 0 0 14px;
    font-weight: 700;
  }

  .type-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }
  .type-row:last-child { border-bottom: none; }

  .type-row .left .type-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .type-row .left .type-count {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 2px;
  }

  .type-row .right .type-total {
    font-size: 16px;
    font-weight: 700;
    color: var(--teal-dark);
    text-align: right;
  }

  .type-row .right .type-bar-wrap {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    margin-top: 5px;
  }

  .type-row .right .type-bar {
    height: 4px;
    background: var(--teal);
    border-radius: 999px;
    transition: width 0.4s;
  }

  /* รายการทั้งหมด */
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .detail-row:last-child { border-bottom: none; }

  .detail-row .left .d-type {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
  }
  .detail-row .left .d-date {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 2px;
  }
  .detail-row .left .d-calc {
    font-size: 11.5px;
    color: var(--text-soft);
    margin-top: 1px;
  }

  .detail-row .right {
    text-align: right;
    white-space: nowrap;
  }
  .detail-row .right .d-total {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
  }

  .empty-box {
    text-align: center;
    padding: 30px 0;
    color: var(--text-soft);
    font-size: 13.5px;
  }

  .loading-box {
    text-align: center;
    padding: 30px 0;
    color: var(--text-soft);
    font-size: 13.5px;
  }

  .guard-box {
    max-width: 420px;
    margin: 80px auto;
    background: var(--card);
    border-radius: var(--radius);
    padding: 32px 26px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .guard-box h2 { color: var(--navy); margin-top: 0; }
  .guard-box a {
    display: inline-block;
    margin-top: 14px;
    background: var(--teal);
    color: #fff;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 7px;
    font-weight: 700;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="guard-box" id="guardBox" style="display:none;">
  <h2>กรุณาเข้าสู่ระบบ</h2>
  <p style="color:var(--text-soft);font-size:14px;">คุณยังไม่ได้เข้าสู่ระบบ หรือ session หมดอายุ</p>
  <a href="index.html">ไปหน้าเข้าสู่ระบบ</a>
</div>

<div id="appContent" style="display:none;">
  <header>
    <div class="title">
      <span class="icon">📊</span>
      <div>
        <h1>สรุป OT ของฉัน</h1>
        <div class="sub" id="greetingSub"></div>
      </div>
    </div>
    <a href="home.html" class="nav-btn">← หน้าหลัก</a>
  </header>

  <main>
    <!-- ตัวกรอง -->
    <div class="filter-bar">
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeMonth" onclick="switchMode('month')">รายเดือน</button>
        <button class="mode-btn" id="modeYear" onclick="switchMode('year')">รายปี</button>
      </div>
      <div class="filter-selects">
        <select id="filterMonth"></select>
        <select id="filterYear"></select>
      </div>
    </div>

    <!-- ปุ่ม Export -->
    <div class="export-bar">
      <span class="label">💾 Export:</span>
      <button class="export-btn pdf" onclick="exportPDF()">📄 PDF</button>
      <button class="export-btn excel" onclick="exportExcel()">📊 Excel (.xlsx)</button>
    </div>

    <!-- ยอดรวมทั้งหมด -->
    <div class="total-hero" id="heroBox">
      <div class="period-label" id="heroLabel">กำลังโหลด...</div>
      <div class="grand"><span id="heroAmount">0</span><span class="unit">บาท</span></div>
      <div class="count-note" id="heroCount"></div>
    </div>

    <!-- แยกตามประเภท -->
    <div class="card" id="typeCard">
      <h2>แยกตามประเภท OT</h2>
      <div id="typeWrap"><div class="loading-box">กำลังโหลด...</div></div>
    </div>

    <!-- รายการทั้งหมด -->
    <div class="card">
      <h2>รายการทั้งหมด</h2>
      <div id="detailWrap"><div class="loading-box">กำลังโหลด...</div></div>
    </div>
  </main>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwxUP6JF7JbJbIzAFPTnIt9LeWBfMe-qzwhn9j_7eEMHjJvlk0FKnh8wetF66Je7qJXaw/exec';

  const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

  // ===== ตรวจสอบสิทธิ์ =====
  let currentUser = null;
  try {
    const stored = sessionStorage.getItem('otSystemUser');
    currentUser = stored ? JSON.parse(stored) : null;
  } catch(e) { currentUser = null; }

  if (!currentUser) {
    document.getElementById('guardBox').style.display = 'block';
  } else {
    document.getElementById('appContent').style.display = 'block';
    document.getElementById('greetingSub').textContent = currentUser.name + ' | ' + currentUser.role;
    initPage();
  }

  let currentMode = 'month';
  let lastRecords = [];
  let lastGrandTotal = 0;

  function initPage() {
    setupFilters();
    loadData();
  }

  function setupFilters() {
    const now = new Date();
    const monthSel = document.getElementById('filterMonth');
    const yearSel = document.getElementById('filterYear');

    THAI_MONTHS.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = i + 1;
      opt.textContent = m;
      if (i + 1 === now.getMonth() + 1) opt.selected = true;
      monthSel.appendChild(opt);
    });

    for (let y = now.getFullYear(); y >= now.getFullYear() - 3; y--) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = (y + 543) + ' (พ.ศ.)';
      if (y === now.getFullYear()) opt.selected = true;
      yearSel.appendChild(opt);
    }

    monthSel.addEventListener('change', loadData);
    yearSel.addEventListener('change', loadData);
  }

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('modeMonth').classList.toggle('active', mode === 'month');
    document.getElementById('modeYear').classList.toggle('active', mode === 'year');
    document.getElementById('filterMonth').style.display = mode === 'month' ? '' : 'none';
    loadData();
  }

  async function loadData() {
    document.getElementById('heroLabel').textContent = 'กำลังโหลด...';
    document.getElementById('heroAmount').textContent = '0';
    document.getElementById('heroCount').textContent = '';
    document.getElementById('typeWrap').innerHTML = '<div class="loading-box">กำลังโหลด...</div>';
    document.getElementById('detailWrap').innerHTML = '<div class="loading-box">กำลังโหลด...</div>';

    const month = currentMode === 'month' ? document.getElementById('filterMonth').value : null;
    const year = document.getElementById('filterYear').value;

    try {
      const result = await callApi({
        action: 'getMyOT',
        userId: currentUser.id,
        month: month,
        year: year
      });

      if (!result.success) {
        document.getElementById('typeWrap').innerHTML = '<div class="empty-box">โหลดข้อมูลไม่สำเร็จ</div>';
        return;
      }

      renderAll(result.records || [], result.grandTotal || 0, month, year);
      lastRecords = result.records || [];
      lastGrandTotal = result.grandTotal || 0;
    } catch(err) {
      document.getElementById('typeWrap').innerHTML = '<div class="empty-box">เชื่อมต่อไม่ได้</div>';
    }
  }

  function renderAll(records, grandTotal, month, year) {
    // Hero box
    const thaiYear = Number(year) + 543;
    const periodLabel = month
      ? `${THAI_MONTHS[Number(month) - 1]} ${thaiYear}`
      : `ปี พ.ศ. ${thaiYear}`;

    document.getElementById('heroLabel').textContent = 'ยอดรวม OT — ' + periodLabel;
    document.getElementById('heroAmount').textContent = formatMoney(grandTotal);
    document.getElementById('heroCount').textContent = `รวม ${records.length} รายการ`;

    if (records.length === 0) {
      document.getElementById('typeWrap').innerHTML = '<div class="empty-box">ไม่มีรายการ OT ในช่วงนี้</div>';
      document.getElementById('detailWrap').innerHTML = '<div class="empty-box">ไม่มีรายการ OT ในช่วงนี้</div>';
      return;
    }

    // แยกตามประเภท
    const typeMap = {};
    records.forEach(r => {
      if (!typeMap[r.otType]) typeMap[r.otType] = { total: 0, count: 0 };
      typeMap[r.otType].total += Number(r.total) || 0;
      typeMap[r.otType].count += 1;
    });

    const maxTypeTotal = Math.max(...Object.values(typeMap).map(v => v.total));
    const typeHtml = Object.entries(typeMap)
      .sort((a, b) => b[1].total - a[1].total)
      .map(([type, val]) => {
        const pct = maxTypeTotal > 0 ? Math.round((val.total / maxTypeTotal) * 100) : 0;
        return `
          <div class="type-row">
            <div class="left">
              <div class="type-name">${escHtml(type)}</div>
              <div class="type-count">${val.count} รายการ</div>
            </div>
            <div class="right">
              <div class="type-total">${formatMoney(val.total)} บาท</div>
              <div class="type-bar-wrap">
                <div class="type-bar" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
        `;
      }).join('');

    document.getElementById('typeWrap').innerHTML = typeHtml;

    // รายการทั้งหมด (เรียงจากใหม่ไปเก่า)
    const sorted = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
    const detailHtml = sorted.map(r => {
      const calcNote = r.hours > 0
        ? `${r.hours} ชม. × ${formatMoney(r.rate)} บาท`
        : `${formatMoney(r.rate)} บาท/ครั้ง`;
      return `
        <div class="detail-row">
          <div class="left">
            <div class="d-type">${escHtml(r.otType)}</div>
            <div class="d-date">${escHtml(r.date)}</div>
            <div class="d-calc">${calcNote}</div>
          </div>
          <div class="right">
            <div class="d-total">${formatMoney(r.total)} บาท</div>
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('detailWrap').innerHTML = detailHtml;
  }

  // ===== Export Functions =====

  function exportPDF() {
    window.print();
  }

  function exportExcel() {
    if (!lastRecords || lastRecords.length === 0) {
      alert('ไม่มีข้อมูลสำหรับ export ในช่วงเวลานี้ครับ');
      return;
    }

    const month = currentMode === 'month' ? document.getElementById('filterMonth').value : null;
    const year = document.getElementById('filterYear').value;
    const thaiYear = Number(year) + 543;
    const periodLabel = month ? `${THAI_MONTHS[Number(month) - 1]}_${thaiYear}` : `ปี_${thaiYear}`;
    const fileName = `OT_${currentUser.name}_${periodLabel}.xlsx`;

    // สร้าง worksheet data
    const wsData = [
      [`สรุป OT — ${currentUser.name} (${currentUser.role})`],
      [`ช่วงเวลา: ${month ? THAI_MONTHS[Number(month) - 1] + ' ' + thaiYear : 'ปี พ.ศ. ' + thaiYear}`],
      [],
      ['วันที่', 'ประเภท OT', 'จำนวนชั่วโมง', 'อัตรา (บาท)', 'ยอดรวม (บาท)']
    ];

    // เรียงรายการจากเก่าไปใหม่
    const sorted = [...lastRecords].sort((a, b) => new Date(a.date) - new Date(b.date));
    sorted.forEach(r => {
      wsData.push([
        r.date,
        r.otType,
        r.hours > 0 ? r.hours : '-',
        r.rate,
        r.total
      ]);
    });

    // แถวยอดรวม
    wsData.push([]);
    wsData.push(['', '', '', 'รวมทั้งหมด', lastGrandTotal]);

    // สร้างไฟล์ xlsx ด้วย SheetJS
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    // ปรับความกว้างคอลัมน์
    ws['!cols'] = [
      { wch: 14 }, // วันที่
      { wch: 18 }, // ประเภท
      { wch: 16 }, // ชั่วโมง
      { wch: 16 }, // อัตรา
      { wch: 18 }, // ยอดรวม
    ];

    XLSX.utils.book_append_sheet(wb, ws, 'OT Summary');
    XLSX.writeFile(wb, fileName);
  }

  // ===== Helpers =====
  async function callApi(payload) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function formatMoney(num) {
    return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
